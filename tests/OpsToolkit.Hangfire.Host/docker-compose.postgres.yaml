services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opstoolkit_hangfire
    ports:
      - "5434:5432"
    volumes:
      - opstoolkit-hangfire-pgdata:/var/lib/postgresql/data

volumes:
  opstoolkit-hangfire-pgdata:
